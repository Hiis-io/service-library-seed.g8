name: Publish Library

on:
  release:
    types: [published]

env:
  ARTIFACT_TOKEN: \${{secrets.ARTIFACT_TOKEN}}
  DEV_ID: \${{secrets.DEV_ID}}

permissions:
  contents: read
  packages: write

jobs:
  publish_library:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - uses: actions/checkout@v4
      - name: Set env
        run: echo "truncated_tag=\$(echo \${GITHUB_REF:11})" >> \$GITHUB_ENV

      - name: Setup sbt launcher
        uses: sbt/setup-sbt@v1

      - name: Build & Publish Library
        env:
          VERSION: \${{env.truncated_tag}}
        run: sbt publish